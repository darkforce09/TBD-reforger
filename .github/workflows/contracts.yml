name: contracts

# Cross-boundary contract gates (DOCUMENTATION_STANDARDS.md §10). Complements schema.yml
# (which validates the golden fixtures). Triggers on the code boundaries that carry @contract
# tags + generated projections.
on:
  push:
    paths:
      - "apps/website/**"
      - "packages/tbd-schema/**"
      - "apps/mod/**"
      - ".github/workflows/contracts.yml"
  pull_request:
    paths:
      - "apps/website/**"
      - "packages/tbd-schema/**"
      - "apps/mod/**"
      - ".github/workflows/contracts.yml"

jobs:
  citations:
    name: "@contract citation integrity"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: "26"
      - run: node packages/tbd-schema/scripts/verify-contract-citations.mjs

  codegen-drift:
    name: schema codegen up to date
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: "26"
      # Rust toolchain so codegen can rustfmt the generated serde projections.
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.95.0"
          components: rustfmt
      - run: make schema-codegen
      - name: Fail if generated contract output is stale
        run: git diff --exit-code -- apps/website/frontend/src/types/contract apps/website/src/contract/generated

  frontend-doc-lint:
    name: eslint (TSDoc contract gate)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/website/frontend
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: "26"
      - run: npm ci
      - run: npm run lint
