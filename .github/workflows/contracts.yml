name: contracts

# Cross-boundary contract gates (DOCUMENTATION_STANDARDS.md §10). Complements schema.yml
# (which validates the golden fixtures). Triggers on the code boundaries that carry @contract
# tags + generated projections.
on:
  push:
    paths:
      - "apps/website/**"
      - "packages/tbd-schema/**"
      - "apps/mod/**"
      - ".github/workflows/contracts.yml"
  pull_request:
    paths:
      - "apps/website/**"
      - "packages/tbd-schema/**"
      - "apps/mod/**"
      - ".github/workflows/contracts.yml"

jobs:
  citations:
    name: "@contract citation integrity"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo run -q -p xtask -- schema citations

  codegen-drift:
    name: schema codegen up to date
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      # T-165.3: codegen is Rust (xtask + typify) — no Node in this job.
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - uses: Swatinem/rust-cache@v2
      - run: make schema-codegen
      - name: Fail if generated contract output is stale
        run: git diff --exit-code -- apps/website/api/src/contract/generated

