name: ci

# Primary full-repo gate (CODING_STANDARDS.md §0.3 CI-2 + TEST-1/2/3 + FMT-1/2/3).
# Required on every push + PR to `main` — NO `paths:` filter. This is what distinguishes
# it from contracts.yml / schema.yml, which stay as path-scoped supplements (do NOT merge
# them here in this slice).
# golangci full-repo gate (GO-2..GO-8, COMP-1) wired T-125.2 — backend step after gofmt.
# contracts.yml go-doc-lint: path-filtered supplement only (no only-new-issues).
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # --- backend: Rust 1.95 + Postgres 18 — the sole backend after the T-145 Go->Rust
  # cutover. fmt (FMT-1) + clippy (GO-2..8 analog) + build + integration tests (TEST-1). ---
  rust-backend:
    name: rust-backend (Rust 1.95 + Postgres 18)
    runs-on: ubuntu-latest
    timeout-minutes: 25
    services:
      db:
        image: postgres:18-alpine
        env:
          POSTGRES_USER: tbd
          POSTGRES_PASSWORD: tbd
          POSTGRES_DB: tbd_reforger
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U tbd -d tbd_reforger"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    defaults:
      run:
        working-directory: apps/website
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.95.0"
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/website
      - name: fmt (FMT-1 analog)
        run: cargo fmt --check
      - name: clippy (GO-2..8 analog)
        env:
          SQLX_OFFLINE: "true"
        run: cargo clippy --all-targets -- -D warnings
      - name: build
        env:
          SQLX_OFFLINE: "true"
        run: cargo build --all-targets
      - name: test (TEST-1 analog)
        env:
          TEST_DATABASE_URL: postgres://tbd:tbd@localhost:5432/tbd_reforger?sslmode=disable
          SQLX_OFFLINE: "true"
        run: cargo test

  # --- map-engine: the T-151 crate gates (fmt + clippy native/wasm32 + native tests) ---
  # T-151.11.4 (audit F-09): these gates previously ran only locally (`make wasm-ci`).
  map-engine:
    name: map-engine (wasm-ci)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      - run: make wasm-ci

  # --- website-leptos: the Rust/Leptos SPA (T-159) — fmt + clippy(wasm32) + trunk release build ---
  # The G gate: proves the SPA compiles + bundles. The editor S/V/R/T smokes need a cached headless
  # chromium (the T-151 pattern) and run as a follow-on job once the SPA is the default; this job is
  # the build-green backstop that keeps `t-159-leptos-ui` compilable in CI.
  website-leptos:
    name: website-leptos (Leptos SPA)
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@v2
        with:
          tool: trunk
      - name: fmt
        run: cargo fmt -p website-leptos --check
      - name: clippy (wasm32)
        run: cargo clippy -p website-leptos --target wasm32-unknown-unknown
      - name: cargo test (native shell)
        run: cargo test -p website-leptos
      - name: trunk build --release
        working-directory: apps/website-leptos
        run: trunk build --release

  # --- frontend: Node 26 — npm ci + format:check (FMT-3) + lint + build + unit tests (TEST-2) ---
  # No map-assets symlink step: vitest resolves `map-assets` via vitest.config.ts, and
  # `vite build` has no map-assets module import (vite.config.ts has no such alias).
  # T-151.11.4 (audit F-09): `src/wasm/pkg` is gitignored and imported by build+tests, so the
  # job builds it first (`make wasm` — rust toolchain + wasm-pack required).
  frontend:
    name: frontend (Node 26)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: apps/website/frontend
    steps:
      - uses: actions/checkout@v7
        with:
          lfs: true
      - uses: actions/setup-node@v6
        with:
          node-version: "26"
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@v2
        with:
          tool: wasm-pack
      - name: build wasm pkg (make wasm)
        working-directory: .
        run: make wasm
      - run: npm ci
      - run: npm run format:check
      - run: npm run lint
      - run: npm run build
      - run: npm test

  # --- schema: golden-mission validate (TEST-3) + @contract citation integrity ---
  schema:
    name: schema + citations
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: "26"
      - name: install schema deps
        working-directory: packages/tbd-schema
        run: npm ci
      - name: validate golden missions (TEST-3)
        working-directory: packages/tbd-schema
        run: npm run validate
      - name: verify @contract citations
        # Run from repo root (matches `make verify-citations`); the script resolves repoRoot
        # from import.meta.url and imports only node: builtins, so cwd is irrelevant.
        run: node packages/tbd-schema/scripts/verify-contract-citations.mjs

  # --- editorconfig: FMT-2 whitespace gate across the whole repo (root .editorconfig) ---
  # Dedicated job (mirrors `make verify-editorconfig`): the checker is a Go binary and runs
  # from the repo root, so it does not belong in the Node-only frontend job. Excludes live in
  # .editorconfig-checker.json. setup-go puts $(go env GOPATH)/bin on PATH for the installed binary.
  editorconfig:
    name: editorconfig (FMT-2)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"
      - name: install editorconfig-checker
        run: go install github.com/editorconfig-checker/editorconfig-checker/v3/cmd/editorconfig-checker@latest
      - name: editorconfig-checker (repo root)
        run: editorconfig-checker
