name: tbd-schema compatibility test

on:
  push:
    paths:
      - "packages/tbd-schema/**"
      - ".github/workflows/schema.yml"
  pull_request:
    paths:
      - "packages/tbd-schema/**"
      - ".github/workflows/schema.yml"

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      # T-165.2: the validate suite is Rust (xtask) — no Node in this workflow.
      - run: cargo run -q -p xtask -- schema validate
