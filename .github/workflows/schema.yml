name: tbd-schema compatibility test

on:
  push:
    paths:
      - "packages/tbd-schema/**"
      - ".github/workflows/schema.yml"
  pull_request:
    paths:
      - "packages/tbd-schema/**"
      - ".github/workflows/schema.yml"

jobs:
  validate:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/tbd-schema
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: "26"
      - run: npm install --no-audit --no-fund
      - run: npm run validate
