name: tbd-schema compatibility test

on:
  push:
    paths:
      - "shared/tbd-schema/**"
      - ".github/workflows/schema.yml"
  pull_request:
    paths:
      - "shared/tbd-schema/**"
      - ".github/workflows/schema.yml"

jobs:
  validate:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: shared/tbd-schema
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm install --no-audit --no-fund
      - run: npm run validate
