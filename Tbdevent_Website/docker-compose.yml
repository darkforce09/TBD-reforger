services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: tbdevent
      POSTGRES_PASSWORD: tbdevent
      POSTGRES_DB: tbdevent
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tbdevent -d tbdevent"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
