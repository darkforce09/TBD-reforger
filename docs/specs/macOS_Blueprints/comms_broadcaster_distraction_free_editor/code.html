<!DOCTYPE html><html class="dark" lang="en"><head>

<body class="bg-background text-on-surface font-body-md min-h-screen pt-12 pb-24 relative overflow-y-scroll bg-[url('https://images.unsplash.com/photo-1550537687-c9a0c270b200?q=80&amp;w=2000&amp;auto=format&amp;fit=crop')] bg-cover bg-center bg-fixed bg-no-repeat before:content-[''] before:absolute before:inset-0 before:bg-background/90 before:-z-10">
<main class="w-full max-w-5xl mx-auto px-4 md:px-gutter">
<!-- Header -->
<header class="mb-stack-lg flex flex-col md:flex-row md:items-end justify-between gap-stack-md">
<div>
<h1 class="font-headline-lg text-headline-lg text-on-surface">Comms Broadcaster</h1>
<p class="font-body-md text-body-md text-on-surface-variant mt-stack-sm">Create and distribute operational updates across the network.</p>
</div>
</header>
<!-- Main Editor Container -->
<section class="bg-slate-900/60 backdrop-blur-xl rounded-2xl border border-white/10 shadow-2xl overflow-hidden relative flex flex-col min-h-[600px]">
<!-- Top Section: Title & Metadata -->
<div class="p-8 pb-4 flex flex-col gap-6">
<div class="flex flex-col md:flex-row md:items-center justify-between gap-4">
<input class="w-full bg-transparent border-none text-on-surface text-4xl font-bold placeholder:text-on-surface-variant/50 focus:ring-0 p-0 outline-none transition-all" id="post-title" placeholder="Enter Announcement Title..." type="text">
<div class="flex items-center gap-3 shrink-0">
<div class="relative group">
<select class="appearance-none bg-white/5 hover:bg-white/10 backdrop-blur-md border border-white/10 text-on-surface font-label-md rounded-full px-5 py-2.5 pr-10 focus:ring-2 focus:ring-primary/50 outline-none transition-all cursor-pointer">
<option value="event">Event</option>
<option value="modpack">Modpack Update</option>
<option value="important">Important</option>
</select>
<span class="material-symbols-outlined absolute right-3 top-1/2 -translate-y-1/2 text-on-surface-variant pointer-events-none group-hover:text-on-surface transition-colors">expand_more</span>
</div>
<button class="bg-white/5 hover:bg-white/10 backdrop-blur-md border border-white/10 text-on-surface font-label-md rounded-full px-5 py-2.5 flex items-center gap-2 transition-all">
<span class="material-symbols-outlined text-[18px]">add_photo_alternate</span>
                        Add Hero Image
                    </button>
</div>
</div>
</div>
<!-- Writing Canvas -->
<div class="flex-1 relative p-8 pt-0 flex flex-col">
<!-- Floating Toolbar -->
<div class="sticky top-4 z-10 mx-auto w-max mb-6">
<div class="bg-white/10 backdrop-blur-md border border-white/10 rounded-full px-4 py-2 flex items-center gap-1 shadow-lg">
<button class="p-2 rounded-full hover:bg-white/10 text-on-surface-variant hover:text-white transition-colors" title="Bold">
<span class="material-symbols-outlined text-[20px]" style="font-variation-settings: 'FILL' 1;">format_bold</span>
</button>
<button class="p-2 rounded-full hover:bg-white/10 text-on-surface-variant hover:text-white transition-colors" title="Italic">
<span class="material-symbols-outlined text-[20px]">format_italic</span>
</button>
<button class="p-2 rounded-full hover:bg-white/10 text-on-surface-variant hover:text-white transition-colors" title="Underline">
<span class="material-symbols-outlined text-[20px]">format_underlined</span>
</button>
<div class="w-px h-5 bg-white/20 mx-2"></div>
<button class="p-2 rounded-full hover:bg-white/10 text-on-surface-variant hover:text-white transition-colors" title="Link">
<span class="material-symbols-outlined text-[20px]">link</span>
</button>
<button class="p-2 rounded-full hover:bg-white/10 text-on-surface-variant hover:text-white transition-colors" title="Image">
<span class="material-symbols-outlined text-[20px]">image</span>
</button>
<div class="w-px h-5 bg-white/20 mx-2"></div>
<button class="p-2 rounded-full hover:bg-white/10 text-on-surface-variant hover:text-white transition-colors" title="Bullet List">
<span class="material-symbols-outlined text-[20px]">format_list_bulleted</span>
</button>
<button class="p-2 rounded-full hover:bg-white/10 text-on-surface-variant hover:text-white transition-colors" title="Numbered List">
<span class="material-symbols-outlined text-[20px]">format_list_numbered</span>
</button>
<div class="w-px h-5 bg-white/20 mx-2"></div>
<button class="p-2 rounded-full hover:bg-white/10 text-on-surface-variant hover:text-white transition-colors" title="Code Block">
<span class="material-symbols-outlined text-[20px]">code</span>
</button>
</div>
</div>
<!-- Editor Area -->
<textarea class="w-full flex-1 min-h-[300px] bg-transparent border-none text-on-surface text-lg leading-relaxed placeholder:text-on-surface-variant/40 resize-none outline-none focus:ring-0 p-0" placeholder="Draft your briefing here..."></textarea>
</div>
<!-- Translucent Publishing Footer -->
<div class="bg-white/5 border-t border-white/10 p-6 flex flex-col md:flex-row items-center justify-between gap-6 backdrop-blur-md">
<!-- Discord Toggle -->
<div class="flex items-center gap-4">
<div class="flex flex-col">
<span class="font-label-md text-on-surface mb-0.5">Push to Discord</span>
<span class="font-body-sm text-sm text-on-surface-variant">Send embed to #announcements</span>
</div>
<div class="relative w-14 h-8 bg-surface-container-high rounded-full p-1 cursor-pointer" onclick="this.classList.toggle('bg-primary-container'); this.querySelector('.dot').classList.toggle('translate-x-6'); this.querySelector('.dot').classList.toggle('bg-primary-container'); this.querySelector('.dot').classList.toggle('bg-on-primary-container');">
<div class="dot w-6 h-6 bg-on-surface-variant rounded-full transition-all duration-300 shadow-sm"></div>
</div>
</div>
<!-- Action Buttons -->
<div class="flex items-center gap-4 w-full md:w-auto">
<button class="px-6 py-3 rounded-xl bg-white/5 hover:bg-white/10 border border-white/10 text-on-surface transition-colors font-label-md w-full md:w-auto">
                        Save Draft
                    </button>
<button class="px-8 py-3 rounded-xl bg-blue-600 hover:bg-blue-500 text-white transition-all font-label-md flex items-center justify-center gap-2 w-full md:w-auto shadow-[0_0_20px_rgba(37,99,235,0.4)] hover:shadow-[0_0_30px_rgba(37,99,235,0.6)] font-bold text-lg">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">cell_tower</span>
                        Publish &amp; Broadcast
                    </button>
</div>
</div>
</section>
</main>
</body></html>
