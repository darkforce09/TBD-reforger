# CODING_STANDARDS.md §10 — full golangci gate (T-125.2): revive, errcheck, errorlint,
# staticcheck, govet, cyclop. CI: ci.yml backend (full repo) + contracts.yml (path-filter).
version: "2"

run:
  timeout: 5m

linters:
  default: none
  enable:
    - revive        # GO-6 exported godoc (comment starts with the name)
    - errcheck      # GO-2/GO-3 unchecked errors (check-blank flags `_ =` discards)
    - errorlint     # GO-4 wrap propagated errors with %w
    - staticcheck   # GO-8 default SA checks
    - govet         # spec §T-125.2 explicit enable
    - cyclop        # COMP-1 cyclomatic complexity <= 15
  settings:
    revive:
      rules:
        - name: exported
          arguments:
            - disableStutteringCheck
    errcheck:
      check-blank: true
    cyclop:
      max-complexity: 15
  exclusions:
    warn-unused: true
    paths:
      # Vendored JS dependency that ships a Go reference impl — not our code, not in go.mod intent.
      - node_modules
    rules:
      # GO-8: generated cross-boundary projections (// Code generated ... DO NOT EDIT.)
      - path: internal/contract/
        linters:
          - staticcheck
          - revive
      # Tests: fixtures intentionally discard known-good errors (IssueAccess/RandomToken/httptest
      # writes); integration-test funcs are long linear assertion sequences. CODING_STANDARDS §2
      # (GO-2/3) + COMP-1 target production logic; the test bar is §6 (TEST-1/2/3, live PG).
      - path: _test\.go
        linters:
          - errcheck
          - cyclop
