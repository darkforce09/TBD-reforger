[build]
target = "index.html"
dist = "dist"

# CI parity: aegis.css is Tailwind v4 syntax (@import/@source/@theme). Locally trunk finds the
# v4 binary on PATH; in CI it would auto-download its 3.x default and fail — pin the version.
[tools]
tailwindcss = "4.3.2"

[serve]
address = "127.0.0.1"
port = 3000
# Cross-origin isolation (mirrors the React app's Vite plugin) — crossOriginIsolated === true so the
# SharedArrayBuffer / wasm-GPU path is available from the Mission Creator slices onward. The gate
# harness serves the built dist via driver/serve.mjs, which sets the same two headers.
headers = { "Cross-Origin-Opener-Policy" = "same-origin", "Cross-Origin-Embedder-Policy" = "credentialless" }

# T-159.24 — dev API proxy (the Vite `/api → :8080` equivalent). Relative `/api/v1/*` calls from the
# app now reach the backend under `trunk serve`; the gate harness keeps stubbing via CDP instead.
# Trunk has no proxy timeout knob — the large mission-version POST was proven through this path in
# the T-159.24 upload spike (see verify log) rather than configured around.
[[proxy]]
backend = "http://127.0.0.1:8080/api"
# Pass 302s through (dev-login / Discord → FRONTEND_URL/auth/callback#…). Following them here
# strips the fragment and leaves the browser on /api/v1/auth/dev-login → SPA 404.
no_redirect = true

# T-159.24 — map-asset passthrough. Dead (404) until the backend serves /map-assets (T-159.29 flip
# build-out); declared now so the dev origin story is fixed: same-origin absolute /map-assets/*.
[[proxy]]
backend = "http://127.0.0.1:8080/map-assets"
