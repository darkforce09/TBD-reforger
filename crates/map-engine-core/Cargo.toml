[package]
name = "map-engine-core"
version = "0.1.0"
edition = "2024"
rust-version = "1.95"
license = "UNLICENSED"
publish = false
description = "Pure Rust compute core for the TBD Reforger map engine, geometry, mission compiler, and (Phase 3) document model. Compiles native (backend + tests) and wasm32."

[lib]
name = "map_engine_core"

# `png` (16-bit DEM decode) is behind a feature so the backend, which only needs the mission
# compiler (Phase 2), never pulls it; the wasm shim enables it. Phase 3 adds `yrs` (`doc` feature).
[features]
png = ["dep:png"]

[dependencies]
png = { version = "0.17", optional = true }
